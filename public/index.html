<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Top-Down Tank Battle</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#0a0a0a; overflow:hidden; }
    #game-container {
      width:100%;
      height:100%;
    }
    /* Phaser Scale.FIT positions the canvas; let browser smooth-scale at any size */
    canvas {
      display:block;
      image-rendering:auto;
    }
  </style>
</head>
<body>
<div id="game-container"></div>
</body>
</html>
